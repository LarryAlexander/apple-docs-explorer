name: Feature request
description: Suggest an improvement for browsing, search, MCP, or release packaging.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow would this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the desired behavior.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - macOS app
        - Browse and filtering
        - Search ranking
        - MCP server
        - CLI
        - Docker/release packaging
        - Documentation
    validations:
      required: true
