name: Bug report
description: Report an issue with the app, CLI, or MCP server.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Include the exact search query, framework name, or MCP call.
      placeholder: |
        1. Open Apple Docs Explorer
        2. Select Accessory Notifications
        3. ...
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "15.0"
    validations:
      required: true
  - type: input
    id: xcode
    attributes:
      label: Xcode version
      placeholder: "27.0"
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: Paste `swift run DocsCLI diagnose-asset`.
      render: text
    validations:
      required: false
  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      multiple: true
      options:
        - macOS app
        - CLI
        - MCP server
        - Docker
    validations:
      required: true
